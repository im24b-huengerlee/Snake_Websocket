<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake WebSocket Demo</title>
    <style>
      body {
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #111827 0%, #030712 65%);
        color: #e5e7eb;
      }

      .app {
        width: min(1100px, 95vw);
        display: grid;
        grid-template-columns: 640px 1fr;
        gap: 20px;
      }

      .panel {
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(4px);
      }

      .left {
        padding: 20px;
      }

      .right {
        padding: 20px;
      }

      h2 {
        margin: 0 0 14px 0;
        color: #f8fafc;
        letter-spacing: 0.2px;
      }

      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        color: #e2e8f0;
        background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.1);
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #status {
        padding: 8px 10px;
        border-radius: 9px;
        background: rgba(30, 41, 59, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.15);
      }

      .score {
        margin-bottom: 12px;
        color: #86efac;
        font-size: 18px;
        font-weight: 700;
      }

      #playfield {
        width: 600px;
        height: 600px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 12px;
        position: relative;
        overflow: hidden;
        background-color: #0b1220;
        background-image:
          linear-gradient(to right, rgba(148, 163, 184, 0.22) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(148, 163, 184, 0.22) 1px, transparent 1px);
        background-size: 30px 30px;
      }

      .snake {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        position: absolute;
        background: linear-gradient(180deg, #4ade80, #16a34a);
        box-shadow: inset 0 0 0 1px rgba(34, 197, 94, 0.3);
      }

      .snake.head {
        background: linear-gradient(180deg, #86efac, #22c55e);
      }
      .snake.head::after {
        content: "🙂";
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 16px;
        line-height: 1;
      }

      #apple {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #fb7185, #e11d48);
        position: absolute;
      }

      .apples-layer .apple {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #fb7185, #e11d48);
        position: absolute;
      }

      .hint {
        margin-top: 12px;
        color: #94a3b8;
        font-size: 13px;
      }

      #messages {
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 10px;
        padding: 12px;
        height: 560px;
        overflow: auto;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
        background: rgba(2, 6, 23, 0.65);
      }

      #gameOverModal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(2, 6, 23, 0.7);
        backdrop-filter: blur(3px);
      }
      #gameOverModal[hidden] {
        display: none;
      }
      .modal-card {
        background: #0f172a;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 14px;
        padding: 20px;
        width: min(360px, 90vw);
        text-align: center;
      }
      .modal-card h3 {
        margin: 0 0 8px 0;
      }
      .modal-card p {
        margin: 0 0 16px 0;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="panel left">
        <h2>Snake WebSocket</h2>
        <div class="row">
          <button id="connectBtn">Connect</button>
          <button id="disconnectBtn" disabled>Disconnect</button>
          <div id="status">Disconnected</div>
        </div>

        <div class="score">
          Score: <span id="score">0</span> |
          Best: <span id="bestScore">0</span> |
          Apples eaten: <span id="applesEaten">0</span>
        </div>
        <div id="playfield">
          <div id="apples" class="apples-layer"></div>
        </div>
        <div class="hint">Snake moves every 0.2s. Arrow keys only change direction.</div>
      </section>

      <aside class="panel right">
        <h2>Live Logs</h2>
        <div id="messages"></div>
      </aside>
    </div>

    <div id="gameOverModal" hidden>
      <div class="modal-card">
        <h3>Game Over</h3>
        <p>Your snake hit something. Restart and beat your best score.</p>
        <button id="restartBtn">Restart</button>
      </div>
    </div>

    <script>
      const connectBtn = document.getElementById("connectBtn");
      const disconnectBtn = document.getElementById("disconnectBtn");
      const statusEl = document.getElementById("status");
      const messagesEl = document.getElementById("messages");
      const playfield = document.getElementById("playfield");
      const applesLayerEl = document.getElementById("apples");
      const scoreEl = document.getElementById("score");
      const bestScoreEl = document.getElementById("bestScore");
      const applesEatenEl = document.getElementById("applesEaten");
      const gameOverModalEl = document.getElementById("gameOverModal");
      const restartBtn = document.getElementById("restartBtn");

      let socket = null;
      let gameOverShown = false;
      let bestScore = Number(sessionStorage.getItem("bestScore") || "0");
      bestScoreEl.textContent = String(bestScore);

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function appendMessage(text) {
        messagesEl.textContent += text + "\n";
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function renderState(jsonText) {
        try {
          const state = JSON.parse(jsonText);
          const cellSize = typeof state.cellSize === "number" ? state.cellSize : 30;

          playfield.style.backgroundSize = `${cellSize}px ${cellSize}px`;
          if (typeof state.gridWidth === "number") {
            playfield.style.width = `${state.gridWidth * cellSize}px`;
          }
          if (typeof state.gridHeight === "number") {
            playfield.style.height = `${state.gridHeight * cellSize}px`;
          }
          if (typeof state.score === "number") {
            scoreEl.textContent = state.score;
            applesEatenEl.textContent = state.score;
            if (state.score > bestScore) {
              bestScore = state.score;
              sessionStorage.setItem("bestScore", String(bestScore));
              bestScoreEl.textContent = String(bestScore);
            }
          }
          renderSnake(state, cellSize);
          renderApples(state, cellSize);

          if (state.gameOver) {
            setStatus("Game Over - hit the wall");
            gameOverModalEl.hidden = false;
            if (!gameOverShown) {
              appendMessage("GAME OVER");
              gameOverShown = true;
            }
          } else {
            gameOverModalEl.hidden = true;
            appendMessage(`x=${state.x}, y=${state.y}, lastAction=${state.lastAction}`);
          }
        } catch (_err) {
          appendMessage(jsonText);
        }
      }

      function renderSnake(state, cellSize) {
        document.querySelectorAll(".snake").forEach((el) => el.remove());
        if (!Array.isArray(state.snake)) return;

        state.snake.forEach((tile, index) => {
          const segment = document.createElement("div");
          segment.className = index === 0 ? "snake head" : "snake";
          segment.style.left = `${tile.x * cellSize}px`;
          segment.style.top = `${tile.y * cellSize}px`;
          segment.style.width = `${cellSize}px`;
          segment.style.height = `${cellSize}px`;
          playfield.appendChild(segment);
        });
      }

      function renderApples(state, cellSize) {
        applesLayerEl.innerHTML = "";
        if (!Array.isArray(state.apples)) return;
        for (const apple of state.apples) {
          const appleEl = document.createElement("div");
          appleEl.className = "apple";
          appleEl.style.left = `${apple.x * cellSize}px`;
          appleEl.style.top = `${apple.y * cellSize}px`;
          appleEl.style.width = `${cellSize}px`;
          appleEl.style.height = `${cellSize}px`;
          applesLayerEl.appendChild(appleEl);
        }
      }

      connectBtn.addEventListener("click", () => {
        setStatus("Connecting...");
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        socket = new WebSocket(`${protocol}://${window.location.host}/game`);

        socket.addEventListener("open", () => {
          setStatus("Connected. Use arrow keys to send actions.");
          gameOverShown = false;
          gameOverModalEl.hidden = true;
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
        });

        socket.addEventListener("message", (event) => {
          // Server sends game state JSON every tick.
          renderState(event.data);
        });

        socket.addEventListener("error", (err) => {
          console.error("WebSocket error", err);
          setStatus("Connection failed (see console)");
        });

        socket.addEventListener("close", () => {
          setStatus("Disconnected");
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          socket = null;
        });
      });

      disconnectBtn.addEventListener("click", () => {
        if (socket) socket.close();
        socket = null;
        gameOverShown = false;
        gameOverModalEl.hidden = true;
        scoreEl.textContent = "0";
        applesEatenEl.textContent = "0";
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        setStatus("Disconnected");
      });

      restartBtn.addEventListener("click", () => {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send("restart");
          gameOverShown = false;
          gameOverModalEl.hidden = true;
          setStatus("Connected. Use arrow keys to send actions.");
        }
      });

      // Log and send keyboard actions.
      window.addEventListener("keydown", (event) => {
        let action = null;
        if (event.key === "ArrowLeft") action = "left";
        if (event.key === "ArrowRight") action = "right";
        if (event.key === "ArrowUp") action = "up";
        if (event.key === "ArrowDown") action = "down";

        if (!action) return;
        event.preventDefault();
        console.log(action);

        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(action);
        }
      });
    </script>
  </body>
</html>
